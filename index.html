<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBOIR Web (Chromebook Optimized)</title>
    <style>
      body, html {
        margin: 0; 
        padding: 0;
        background-color: #000;
        color: #f8fafc;
        font-family: system-ui, -apple-system, sans-serif;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      #game-container {
        width: 100%;
        height: 100%;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game {
        width: 100%;
        height: 100%;
        max-width: 100vw;
        max-height: 100vh;
      }
      .loader-ui {
        position: absolute;
        background: #1e293b;
        padding: 30px;
        border-radius: 12px;
        text-align: center;
        max-width: 420px;
        width: 85%;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7);
        z-index: 100;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      #loading-progress {
        font-size: 24px;
        font-weight: bold;
        color: #38bdf8;
        margin-bottom: 10px;
      }
      #status-msg {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 20px;
        line-height: 1.4;
      }
      .progress-bar {
        width: 100%;
        height: 8px;
        background: #334155;
        border-radius: 4px;
        margin-bottom: 20px;
        overflow: hidden;
      }
      #progress-fill {
        width: 0%;
        height: 100%;
        background: #38bdf8;
        box-shadow: 0 0 10px #38bdf8;
        transition: width 0.2s ease-out;
      }
      #start-btn {
        display: none;
        background: #10b981; /* Green for GO */
        color: #fff;
        border: none;
        padding: 16px 32px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 1.1rem;
        cursor: pointer;
        width: 100%;
        transition: transform 0.1s;
      }
      #start-btn:hover { background: #059669; transform: scale(1.02); }
      .sub-note {
        font-size: 11px;
        color: #64748b;
        margin-top: 10px;
      }
    </style>
</head>
<body>
  <div id="game-container">
    <div id="game"></div>
    
    <div class="loader-ui" id="loader-ui">
      <div id="loading-progress">0%</div>
      <div class="progress-bar"><div id="progress-fill"></div></div>
      <div id="status-msg">Preparing Chromebook Mode...</div>
      <button id="start-btn">START (LOW-END OPTIMIZED)</button>
      <div class="sub-note">Resolution limited to 1x and Frameskip enabled for stability.</div>
    </div>
  </div>

  <script>
    // CHROMEBOOK / LOW-END OPTIMIZATIONS
    window.EJS_threads = true; 
    window.EJS_WASM = true;           // WASM is essential for Chromebooks
    window.EJS_highResolution = false; // DISABLED: Forces 1x resolution to save GPU
    window.EJS_forceVsync = false;     // DISABLED: VSync can cause input lag on weak CPUs
    
    const gameConfig = {
      name: "Binding Of Isaac Rebirth",
      baseUrl: "https://raw.githubusercontent.com/jamesbrownedu/TBOIR/main/tboirpsp0301.iso",
      core: "ppsspp",
      parts: 7
    };

    let romBlobUrl = null;

    async function init() {
      try {
        const buffers = [];
        for (let i = 1; i <= gameConfig.parts; i++) {
          const partUrl = `${gameConfig.baseUrl}.part${i}`;
          document.getElementById('status-msg').textContent = `Caching Assets... (${i}/${gameConfig.parts})`;
          
          const response = await fetch(partUrl);
          if (!response.ok) throw new Error();
          
          const data = await response.arrayBuffer();
          buffers.push(data);
          
          const percent = Math.round((i / gameConfig.parts) * 100);
          document.getElementById('progress-fill').style.width = percent + '%';
          document.getElementById('loading-progress').textContent = percent + '%';
        }

        romBlobUrl = URL.createObjectURL(new Blob(buffers));
        document.getElementById('loading-progress').textContent = "READY";
        document.getElementById('status-msg').textContent = "ROM ready in memory. System set to Low-Power mode.";
        document.getElementById('start-btn').style.display = "block";
      } catch (e) {
        document.getElementById('loading-progress').textContent = "RETRY";
        document.getElementById('status-msg').textContent = "Download timed out. Chromebooks sometimes drop connections—please refresh.";
      }
    }

    document.getElementById('start-btn').onclick = function() {
      document.getElementById('loader-ui').style.display = "none";
      
      window.EJS_player = "#game";
      window.EJS_core = gameConfig.core;
      window.EJS_gameName = gameConfig.name;
      window.EJS_color = "#10b981";
      window.EJS_startOnLoaded = true;
      window.EJS_pathtodata = "https://cdn.jsdelivr.net/gh/genizy/emu@master/";
      window.EJS_gameUrl = romBlobUrl;
      
      // Core specific low-end overrides
      window.EJS_settings = {
          "frameskip": "1",          // Skips every 2nd frame to keep game speed 100%
          "jit": "1",                // Ensure Just-In-Time compiler is ON
          "audio-latency": "high",   // Higher latency = less crackling on slow CPUs
          "render-resolution": "1"    // Explicit 1x scaling
      };

      setTimeout(() => {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/gh/genizy/emu@master/loader.js";
        document.body.appendChild(script);
      }, 50);
    };

    window.onload = init;
  </script>
</body>
</html>
